name: Combine and Auto-Merge Dependabot PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 6'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-dependabot-prs:
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.check_prs.outputs.result }}
    steps:
      - name: Check if Dependabot PRs exist
        id: check_prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            const dependabotPRs = prs.filter(pr =>
              pr.user.login === "dependabot[bot]" || pr.head.ref.startsWith("dependabot/")
            );
            core.info(`Found ${dependabotPRs.length} Dependabot PR(s).`);
            return dependabotPRs.length > 0 ? "true" : "false";
          result-encoding: string

  get-prs-without-conflicts:
    needs: check-dependabot-prs
    if: needs.check-dependabot-prs.outputs.found == 'true'
    runs-on: ubuntu-latest
    outputs:
      conflicts: ${{ steps.set_output.outputs.conflicts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Necesario para cherry-pick

      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Fetch all PRs and test cherry-pick
        id: simulate_cherry_pick
        uses: actions/github-script@v7
        with:
          script: |
            const execSync = require('child_process').execSync;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const dependabotPRs = prs.filter(pr =>
              pr.user.login === "dependabot[bot]" || pr.head.ref.startsWith("dependabot/")
            );

            console.log(`Found ${dependabotPRs.length} Dependabot PRs`);
            execSync('git checkout -b temp-cherry-pick origin/debian/master');

            let conflictFree = 0;
            for (const pr of dependabotPRs) {
              try {
                execSync(`git fetch origin ${pr.head.ref}`);
                execSync(`git cherry-pick FETCH_HEAD`);
                conflictFree++;
              } catch (err) {
                console.log(`Conflict in PR #${pr.number}, skipping...`);
                execSync('git cherry-pick --abort');
              }
            }

            const result = conflictFree > 0 ? 'true' : 'false';
            console.log(`Result: ${result}`);
            core.setOutput('conflicts', result);
      
      - name: Set output
        id: set_output
        run: echo "conflicts=${{ steps.simulate_cherry_pick.outputs.conflicts }}" >> $GITHUB_OUTPUT

  combine-dependabot-prs:
    needs: get-prs-without-conflicts
    if: needs.get-prs-without-conflicts.outputs.conflicts == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: "dependabot-combine-${{ github.ref }}"
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clean combined branch if exists
        run: |
          if git ls-remote --exit-code --heads origin dependabot-combined-prs; then
            git push origin --delete dependabot-combined-prs
          else
            echo "La rama dependabot-combined-prs no existe en el remoto."
          fi

      - name: Combine Dependabot PRs
        uses: mAAdhaTTah/combine-dependabot-prs@main
        with:
          branchPrefix: dependabot
          mustBeGreen: true
          combineBranchName: dependabot-combined-prs
          baseBranch: debian/master
          openPR: true
          allowSkipped: true
          ignoreLabel: nocombine
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Combined PR number
        id: get_pr_info
        uses: actions/github-script@v7
        with:
          script: |
            // Espera 2 segundos para que la nueva PR se indexe; ajustar si es necesario
            await new Promise(resolve => setTimeout(resolve, 2000));
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:dependabot-combined-prs`
            });
            if (prs.length === 0) {
              core.info("No combined PR found.");
              return;
            }
            core.setOutput("pr_number", prs[0].number);
          result-encoding: string

  automerge-dependabot-prs:
    needs: combine-dependabot-prs
    if: needs.combine-dependabot-prs.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve with Bot Token
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.BOT_PAT }}
          pull-request-number: ${{ needs.combine-dependabot-prs.outputs.pr_number }}

      - name: Merge Combined PR (solo si autor es github-actions o dependabot)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const prNumber = parseInt('${{ needs.combine-dependabot-prs.outputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const author = pr.user.login;
            core.info(`El autor del PR #${prNumber} es ${author}`);
            if (author === 'github-actions[bot]' || author === 'dependabot[bot]') {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              core.info(`✅ PR #${prNumber} fusionado correctamente.`);
            } else {
              core.info(`⏭ PR #${prNumber} no fusionado (autor: ${author})`);
            }

      - name: Delete combined branch if merged
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ needs.combine-dependabot-prs.outputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            if (pr.merged) {
              core.info("PR has been merged. Deleting combined branch...");
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/dependabot-combined-prs'
              });
            } else {
              core.info("PR not merged. Keeping combined branch.");
            }

      
      - name: Close and delete combined branch if merged
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ needs.combine-dependabot-prs.outputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const body = pr.body;
            const prNumbers = [...body.matchAll(/#(\d+)/g)].map(match => Number(match[1]));

            for (const number of prNumbers) {
              try {
                // Cerrar la PR original
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: number,
                  state: 'closed'
                });
                core.info(`PR #${number} cerrada.`);

                // Obtener información de la PR para eliminar la rama
                const { data: originalPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: number
                });

                const branchRef = `heads/${originalPr.head.ref}`;
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: branchRef
                });
                core.info(`Rama ${branchRef} eliminada.`);
              } catch (error) {
                core.warning(`No se pudo cerrar o eliminar la PR #${number}: ${error.message}`);
              }
            }
